name: ModelWatch CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install runtime dependencies
        run: |
          pip install -r requirements-space.txt
          pip install pytest==8.0.0

      - name: Generate synthetic database
        run: python ci_setup.py

      - name: Train baseline and monitoring models
        run: |
          python models/lgbm_model.py
          python models/isolation_forest.py
          python models/autoencoder.py
          python models/lstm_forecast.py
          python models/champion_challenger.py

      - name: Run drift detection scripts
        run: |
          python monitoring/psi.py
          python monitoring/statistical_tests.py
          python monitoring/performance_tracker.py
          python monitoring/shap_drift.py
          python monitoring/alerting.py

      - name: Run test suite
        run: pytest tests/ -v --tb=short
