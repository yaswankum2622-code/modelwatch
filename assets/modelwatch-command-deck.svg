  <text x="90" y="180" font-family="Segoe UI, Arial, sans-serif" font-size="64" font-weight="800" fill="#111827">MODELWATCH</text>
  <text x="90" y="224" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="600" fill="#0F172A">Detect. Explain. Forecast. Retrain.</text>
  <text x="90" y="264" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#475569">A production-style monitoring system for credit-risk models that traces</text>
  <text x="90" y="292" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#475569">how data drift becomes quality loss, behaviour shift, and retraining pressure.</text>

  <rect x="90" y="330" width="122" height="38" rx="19" fill="#0F766E"/>
